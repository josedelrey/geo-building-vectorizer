dataset:
  name: whu_mix_vector

splits:
  train:
    image_dir: data/raw/whu_mix_vector/train/image
    annotation_file: data/raw/whu_mix_vector/train/train.json

  val:
    image_dir: data/raw/whu_mix_vector/val/image
    annotation_file: data/raw/whu_mix_vector/val/val.json

  test:
    image_dir: data/raw/whu_mix_vector/test/image
    annotation_file: data/raw/whu_mix_vector/test/test.json

  test2:
    image_dir: data/raw/whu_mix_vector/test2/image
    annotation_file: data/raw/whu_mix_vector/test2/test2.json

output:
  root: outputs
  manifest_dir: data/processed/manifests
  debug_dir: debug
  dataloader_check: check_dataloader/dataloader_{split}_000.png

targets:
  boundary_width: 3

  corner:
    radius: 4
    sigma: 2.0
    source: simplified
    simplify_tolerance: 1.0
    cumulative_turn_angle_degrees: 25.0

  center:
    radius: 5
    sigma: 2.5

  offset:
    normalize: true
